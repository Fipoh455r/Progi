version: "3.8"

# ============================================================
#  LocalAI — локальный AI-ассистент без облака
#  Работает на любом Linux с Docker
#  Использует Ollama (движок) + Open WebUI (интерфейс)
# ============================================================

services:

  # --- Ollama: движок для запуска локальных LLM ---
  ollama:
    image: ollama/ollama:latest
    container_name: localai-ollama
    restart: unless-stopped
    volumes:
      # Хранилище моделей — сохраняется между перезапусками
      - ollama-models:/root/.ollama
    ports:
      - "11434:11434"       # API Ollama (для других программ)
    environment:
      - OLLAMA_KEEP_ALIVE=24h
      - OLLAMA_NUM_PARALLEL=1
    # Использовать GPU (NVIDIA) — если нет GPU, просто игнорируется
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # --- Open WebUI: красивый веб-интерфейс для чата ---
  webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: localai-webui
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy
    ports:
      - "3000:8080"         # Открыть браузер: http://localhost:3000
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - WEBUI_SECRET_KEY=localai-secret-change-me
      - ENABLE_SIGNUP=true
      - DEFAULT_LOCALE=ru
      - WEBUI_NAME=LocalAI
    volumes:
      - webui-data:/app/backend/data

  # --- Загрузчик модели: запускается один раз и скачивает модель ---
  model-loader:
    image: curlimages/curl:latest
    container_name: localai-model-loader
    depends_on:
      ollama:
        condition: service_healthy
    # qwen2.5:0.5b — очень лёгкая модель (~400MB), работает на слабом железе
    # Для более мощных ПК можно заменить на: llama3.2:1b или mistral:7b
    entrypoint: >
      sh -c "
        echo 'Загрузка модели qwen2.5:0.5b (~400MB)...' &&
        curl -s -X POST http://ollama:11434/api/pull
          -H 'Content-Type: application/json'
          -d '{\"name\": \"qwen2.5:0.5b\"}'
          --no-buffer &&
        echo 'Модель загружена!'
      "
    restart: "no"

volumes:
  ollama-models:
    driver: local
  webui-data:
    driver: local
