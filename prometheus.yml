# prometheus.yml — конфигурация Prometheus для скрейпинга LocalAI v3.0
#
# Использование:
#   docker compose --profile monitoring up prometheus

global:
  scrape_interval: 30s
  evaluation_interval: 30s

scrape_configs:
  - job_name: localai
    static_configs:
      - targets: ['localai:8080']
    metrics_path: /metrics

  - job_name: ollama
    static_configs:
      - targets: ['ollama:11434']
    metrics_path: /metrics
