version: "3.8"

# ============================================================
#  Версия БЕЗ GPU — для слабых ПК и серверов без видеокарты
#  Запуск: docker compose -f docker-compose.cpu.yml up -d
# ============================================================

services:

  ollama:
    image: ollama/ollama:latest
    container_name: localai-ollama
    restart: unless-stopped
    volumes:
      - ollama-models:/root/.ollama
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_KEEP_ALIVE=24h
      - OLLAMA_NUM_PARALLEL=1
      # Ограничение CPU для слабых машин
      - OLLAMA_MAX_LOADED_MODELS=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: localai-webui
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy
    ports:
      - "3000:8080"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - WEBUI_SECRET_KEY=localai-secret-change-me
      - ENABLE_SIGNUP=true
      - DEFAULT_LOCALE=ru
      - WEBUI_NAME=LocalAI
    volumes:
      - webui-data:/app/backend/data

  model-loader:
    image: curlimages/curl:latest
    container_name: localai-model-loader
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: >
      sh -c "
        echo 'Загрузка модели qwen2.5:0.5b (~400MB)...' &&
        curl -s -X POST http://ollama:11434/api/pull
          -H 'Content-Type: application/json'
          -d '{\"name\": \"qwen2.5:0.5b\"}'
          --no-buffer &&
        echo 'Модель загружена!'
      "
    restart: "no"

volumes:
  ollama-models:
    driver: local
  webui-data:
    driver: local
