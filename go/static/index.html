<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>LocalAI</title>
<style>
:root{
  --bg:#0d1117;--sur:#161b22;--sur2:#21262d;--bor:#30363d;
  --txt:#c9d1d9;--dim:#8b949e;--acc:#58a6ff;--red:#f85149;
  --grn:#3fb950;--yel:#d29922;--pur:#bc8cff;
  --ubg:#1c2e4a;--ubor:#1f6feb;--sbw:240px
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:var(--bg);color:var(--txt);height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* ── Шапка ── */
header{background:var(--sur);border-bottom:1px solid var(--bor);
  padding:8px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0;z-index:10}
.logo{font-weight:700;font-size:1rem;color:var(--acc);letter-spacing:1px;white-space:nowrap}
.logo em{color:var(--red);font-style:normal}
.hgap{flex:1}
select,input[type=range]{background:var(--sur2);color:var(--txt);border:1px solid var(--bor);
  border-radius:6px;padding:4px 8px;font-size:.82rem;cursor:pointer}
select:focus,input:focus{outline:none;border-color:var(--acc)}
.btn{background:var(--sur2);color:var(--txt);border:1px solid var(--bor);
  padding:5px 11px;border-radius:6px;cursor:pointer;font-size:.82rem;
  transition:background .15s,border-color .15s;white-space:nowrap;user-select:none}
.btn:hover{background:var(--bor);border-color:var(--acc)}
.btn.prim{background:#1f6feb;border-color:#1f6feb;color:#fff}
.btn.prim:hover{background:#388bfd}
.btn.icon{padding:5px 8px;font-size:.95rem}
.btn:disabled{opacity:.4;cursor:default}
#hamburger{display:none}

/* ── Основной контейнер ── */
.main{display:flex;flex:1;overflow:hidden}

/* ── Боковая панель ── */
aside{width:var(--sbw);background:var(--sur);border-right:1px solid var(--bor);
  display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.aside-top{padding:10px;border-bottom:1px solid var(--bor);flex-shrink:0}
.aside-top .btn{width:100%;text-align:left;padding:8px 12px}
#sess-list{flex:1;overflow-y:auto;padding:6px}
.sess-item{display:flex;align-items:center;gap:6px;padding:7px 10px;
  border-radius:6px;cursor:pointer;font-size:.83rem;
  transition:background .12s;position:relative}
.sess-item:hover{background:var(--sur2)}
.sess-item.active{background:var(--sur2);border:1px solid var(--bor)}
.sess-item.active{border-left:3px solid var(--acc)}
.sess-title{flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.sess-date{color:var(--dim);font-size:.72rem;white-space:nowrap}
.sess-del{opacity:0;font-size:.8rem;color:var(--red);background:none;border:none;
  cursor:pointer;padding:2px 4px;border-radius:4px;line-height:1}
.sess-item:hover .sess-del{opacity:1}
.aside-empty{color:var(--dim);font-size:.82rem;text-align:center;padding:20px 10px}

/* ── Зона чата ── */
.chat-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden}
#messages{flex:1;overflow-y:auto;padding:20px 18px;display:flex;flex-direction:column;gap:16px}
.msg{display:flex;gap:10px;max-width:860px;animation:fadeUp .2s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
.msg.user{align-self:flex-end;flex-direction:row-reverse;max-width:75%}
.av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:.85rem;flex-shrink:0;margin-top:3px}
.msg.user .av{background:#1f6feb}
.msg.ai   .av{background:#238636}
.bubble{background:var(--sur);border:1px solid var(--bor);border-radius:10px;
  padding:10px 14px;line-height:1.65;font-size:.92rem;word-break:break-word}
.msg.user .bubble{background:var(--ubg);border-color:var(--ubor)}

/* Markdown внутри пузыря */
.bubble h1,.bubble h2,.bubble h3,.bubble h4{margin:10px 0 5px;color:#e6edf3;font-size:.95rem}
.bubble p{margin-bottom:7px}.bubble p:last-child{margin-bottom:0}
.bubble ul,.bubble ol{padding-left:20px;margin:5px 0}
.bubble li{margin-bottom:3px}
.bubble blockquote{border-left:3px solid var(--acc);padding-left:10px;color:var(--dim);margin:7px 0}
.bubble hr{border:none;border-top:1px solid var(--bor);margin:8px 0}
.bubble a{color:var(--acc);text-decoration:none}.bubble a:hover{text-decoration:underline}
.bubble strong{color:#e6edf3}
.bubble code{font-family:'Consolas','Fira Code',monospace;font-size:.83em;
  background:rgba(110,118,129,.2);padding:1px 5px;border-radius:4px}
.bubble pre{background:#010409;border:1px solid var(--bor);border-radius:8px;
  margin:8px 0;overflow:hidden}
.pre-header{display:flex;align-items:center;justify-content:space-between;
  padding:5px 12px;background:#161b22;border-bottom:1px solid var(--bor)}
.pre-lang{font-size:.75rem;color:var(--dim);font-family:monospace}
.copy-btn{font-size:.72rem;padding:2px 7px;background:var(--sur2);border:1px solid var(--bor);
  color:var(--dim);border-radius:4px;cursor:pointer;transition:color .15s}
.copy-btn:hover{color:var(--txt)}
.bubble pre code{display:block;padding:12px;overflow-x:auto;font-size:.83em;
  font-family:'Consolas','Fira Code',monospace;background:none;border-radius:0;line-height:1.6}

/* Syntax colors */
.kw{color:#ff7b72}.st{color:#a5d6ff}.cm{color:#8b949e;font-style:italic}
.nm{color:#ffa657}.fn{color:#d2a8ff}.tp{color:#79c0ff}

/* Cursor mигает */
.cursor{display:inline-block;width:2px;height:1em;background:var(--acc);
  vertical-align:text-bottom;animation:blink .6s steps(1) infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* Печатает */
.typing{display:flex;gap:4px;padding:4px 0}
.typing i{width:7px;height:7px;background:var(--acc);border-radius:50%;
  animation:bnc 1.3s infinite ease-in-out}
.typing i:nth-child(1){animation-delay:-.32s}
.typing i:nth-child(2){animation-delay:-.16s}
@keyframes bnc{0%,80%,100%{transform:scale(0)}40%{transform:scale(1)}}

/* Строка статуса */
#statusbar{font-size:.72rem;color:var(--dim);background:var(--sur);
  border-top:1px solid var(--sur2);padding:3px 16px;display:flex;
  justify-content:space-between;flex-shrink:0}

/* Поле ввода */
#input-row{background:var(--sur);border-top:1px solid var(--bor);
  padding:10px 14px;display:flex;gap:8px;align-items:flex-end;flex-shrink:0}
#input{flex:1;background:var(--sur2);color:var(--txt);border:1px solid var(--bor);
  border-radius:8px;padding:9px 12px;font-size:.92rem;
  outline:none;resize:none;min-height:40px;max-height:130px;font-family:inherit;line-height:1.5}
#input::placeholder{color:var(--dim)}
#input:focus{border-color:var(--acc);box-shadow:0 0 0 2px rgba(88,166,255,.12)}
#send{padding:9px 16px;font-size:1rem}

/* Панель настроек */
#settings-panel{position:fixed;top:0;right:-340px;width:320px;height:100vh;
  background:var(--sur);border-left:1px solid var(--bor);
  z-index:100;display:flex;flex-direction:column;
  transition:right .25s ease;overflow-y:auto}
#settings-panel.open{right:0}
.sp-head{display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px;border-bottom:1px solid var(--bor)}
.sp-head h2{font-size:.95rem;font-weight:600}
.sp-body{padding:16px;display:flex;flex-direction:column;gap:14px;flex:1}
.sp-field label{display:block;font-size:.78rem;color:var(--dim);margin-bottom:5px;font-weight:600}
.sp-field textarea{width:100%;background:var(--sur2);color:var(--txt);
  border:1px solid var(--bor);border-radius:6px;padding:8px 10px;
  font-size:.82rem;resize:vertical;min-height:90px;font-family:inherit;line-height:1.5}
.sp-field textarea:focus{outline:none;border-color:var(--acc)}
.sp-field .row{display:flex;justify-content:space-between;align-items:center}
.sp-field input[type=range]{width:100%;margin-top:4px}
.sp-presets{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px}
.preset-btn{font-size:.75rem;padding:3px 8px;background:var(--sur2);
  border:1px solid var(--bor);color:var(--txt);border-radius:4px;cursor:pointer}
.preset-btn:hover{border-color:var(--acc);color:var(--acc)}
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99}
#overlay.on{display:block}

/* Скроллбар */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bor);border-radius:3px}

/* Адаптив */
@media(max-width:640px){
  aside{position:absolute;left:-100%;height:100%;z-index:50;transition:left .25s}
  aside.open{left:0}
  #hamburger{display:flex}
  .msg.user,.msg.ai{max-width:95%}
}
</style>
</head>
<body>

<header>
  <button class="btn icon" id="hamburger" onclick="toggleSidebar()" title="Меню">☰</button>
  <span class="logo">⚡ LOCAL<em>AI</em></span>
  <div class="hgap"></div>
  <select id="model-sel" title="Модель" onchange="onModelChange()"></select>
  <button class="btn icon" onclick="openSettings()" title="Настройки">⚙</button>
</header>

<div class="main">
  <!-- Боковая панель -->
  <aside id="sidebar">
    <div class="aside-top">
      <button class="btn" onclick="newSession()">＋ Новый чат</button>
    </div>
    <div id="sess-list"><div class="aside-empty">Нет сохранённых чатов</div></div>
  </aside>

  <!-- Чат -->
  <div class="chat-wrap">
    <div id="messages">
      <div class="msg ai">
        <div class="av">🤖</div>
        <div class="bubble"><p>Привет! Я <strong>LocalAI</strong> — твой локальный AI-ассистент.<br>
        Работаю полностью без интернета. Задай любой вопрос!</p></div>
      </div>
    </div>
    <div id="statusbar">
      <span id="st-info">Подключение...</span>
      <span id="st-speed"></span>
    </div>
    <div id="input-row">
      <textarea id="input" placeholder="Введи сообщение… (Enter — отправить, Shift+Enter — новая строка)" rows="1"></textarea>
      <button class="btn prim" id="send" onclick="send()">➤</button>
    </div>
  </div>
</div>

<!-- Панель настроек -->
<div id="overlay" onclick="closeSettings()"></div>
<div id="settings-panel">
  <div class="sp-head">
    <h2>⚙ Настройки чата</h2>
    <button class="btn icon" onclick="closeSettings()">✕</button>
  </div>
  <div class="sp-body">
    <div class="sp-field">
      <label>Системный промпт</label>
      <div class="sp-presets">
        <button class="preset-btn" onclick="applyPreset('assistant')">Ассистент</button>
        <button class="preset-btn" onclick="applyPreset('coder')">Программист</button>
        <button class="preset-btn" onclick="applyPreset('translator')">Переводчик</button>
        <button class="preset-btn" onclick="applyPreset('analyst')">Аналитик</button>
      </div>
      <textarea id="sp-prompt" rows="5" placeholder="Инструкция для модели..."></textarea>
    </div>
    <div class="sp-field">
      <label><div class="row"><span>Температура (случайность)</span><span id="sp-temp-val">0.7</span></div></label>
      <input type="range" id="sp-temp" min="0" max="2" step="0.1" value="0.7"
             oninput="document.getElementById('sp-temp-val').textContent=this.value">
    </div>
    <div class="sp-field">
      <label>Название чата</label>
      <input type="text" id="sp-title" style="width:100%;background:var(--sur2);color:var(--txt);
        border:1px solid var(--bor);border-radius:6px;padding:7px 10px;font-size:.85rem" placeholder="Авто">
    </div>
    <button class="btn prim" style="margin-top:4px" onclick="saveSettings()">Сохранить</button>
  </div>
</div>

<script>
// ── Состояние ────────────────────────────────────────────────────────────
let activeSid  = 'sess_' + Math.random().toString(36).slice(2,10);
let busy       = false;
let genStart   = 0;
let genTokens  = 0;

// ── Утилиты ──────────────────────────────────────────────────────────────
const $  = id  => document.getElementById(id);
const esc = s  => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

function setStatus(msg, speed) {
  $('st-info').textContent = msg;
  $('st-speed').textContent = speed || '';
}

// ── Подсветка кода (однопроходный токенизатор) ────────────────────────
const KW = {
  go:'func|var|const|type|package|import|if|else|for|range|return|struct|interface|map|chan|go|defer|select|case|default|break|continue|nil|true|false|new|make|len|cap|append|copy|delete|panic|recover',
  python:'def|class|import|from|if|elif|else|for|while|return|True|False|None|and|or|not|in|is|lambda|with|as|try|except|finally|raise|yield|pass|break|continue|print|len|range|type|list|dict|set',
  js:'function|var|let|const|if|else|for|while|return|true|false|null|undefined|new|this|typeof|class|extends|import|export|default|from|async|await|try|catch|finally|throw|of|in|do|switch|case|break|continue',
  ts:'function|var|let|const|if|else|for|while|return|true|false|null|undefined|new|this|typeof|class|extends|import|export|default|from|async|await|try|catch|finally|throw|of|in|do|switch|case|interface|type|enum|implements|abstract|public|private|protected|readonly',
  bash:'if|then|else|elif|fi|for|while|do|done|case|esac|function|return|local|export|echo|exit|cd|ls|mkdir|rm|cp|mv|grep|sed|awk|find|chmod|sudo|true|false',
  sql:'SELECT|FROM|WHERE|AND|OR|NOT|INSERT|UPDATE|DELETE|CREATE|DROP|ALTER|TABLE|JOIN|LEFT|RIGHT|INNER|ON|AS|GROUP|BY|ORDER|HAVING|LIMIT|DISTINCT|COUNT|SUM|AVG|MAX|MIN|NULL',
};
KW.javascript = KW.js; KW.typescript = KW.ts; KW.shell = KW.bash; KW.sh = KW.bash;

function highlight(src, lang) {
  const kws = new Set((KW[lang] || KW.js).split('|'));
  let r = '', i = 0;
  while (i < src.length) {
    const ch = src[i];
    // single-line comment // or #
    if ((ch==='/' && src[i+1]==='/') || (ch==='#' && lang!=='cpp')) {
      let e = src.indexOf('\n', i); if (e<0) e=src.length;
      r += `<span class="cm">${esc(src.slice(i,e))}</span>`; i=e; continue;
    }
    // block comment /* */
    if (ch==='/' && src[i+1]==='*') {
      let e = src.indexOf('*/',i+2); if (e<0) e=src.length-2;
      r += `<span class="cm">${esc(src.slice(i,e+2))}</span>`; i=e+2; continue;
    }
    // string " ' `
    if (ch==='"'||ch==="'"||ch==='`') {
      const q=ch; let j=i+1;
      while (j<src.length && src[j]!==q) { if(src[j]==='\\')j++; j++; }
      r += `<span class="st">${esc(src.slice(i,j+1))}</span>`; i=j+1; continue;
    }
    // number
    if (ch>='0'&&ch<='9') {
      let j=i; while(j<src.length&&(src[j]>='0'&&src[j]<='9'||src[j]==='.'))j++;
      r += `<span class="nm">${esc(src.slice(i,j))}</span>`; i=j; continue;
    }
    // word
    if (/[a-zA-Z_$]/.test(ch)) {
      let j=i; while(j<src.length&&/[a-zA-Z0-9_$]/.test(src[j]))j++;
      const w=src.slice(i,j);
      r += kws.has(w) ? `<span class="kw">${esc(w)}</span>` : esc(w);
      i=j; continue;
    }
    r += esc(ch); i++;
  }
  return r;
}

// ── Рендер Markdown ───────────────────────────────────────────────────
function renderMD(raw) {
  let s = raw;

  // Блоки кода ```lang\n...\n```
  s = s.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) => {
    const l = lang || 'text';
    const id = 'cb_' + Math.random().toString(36).slice(2,7);
    const hi = highlight(code.trimEnd(), l);
    return `<pre><div class="pre-header"><span class="pre-lang">${esc(l)}</span>` +
      `<button class="copy-btn" onclick="copyCode('${id}')">Копировать</button></div>` +
      `<code id="${id}">${hi}</code></pre>`;
  });

  // Заголовки
  s = s.replace(/^#### (.+)$/gm, '<h4>$1</h4>');
  s = s.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  s = s.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  s = s.replace(/^# (.+)$/gm, '<h1>$1</h1>');

  // Горизонтальная черта
  s = s.replace(/^---+$/gm, '<hr>');

  // Цитата
  s = s.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');

  // Списки
  s = s.replace(/^(\s*[-*+] .+(\n\s*[-*+] .+)*)/gm, m => {
    const items = m.split('\n').filter(Boolean)
      .map(l => `<li>${l.replace(/^\s*[-*+] /,'').replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')}</li>`);
    return '<ul>' + items.join('') + '</ul>';
  });
  s = s.replace(/^(\s*\d+\. .+(\n\s*\d+\. .+)*)/gm, m => {
    const items = m.split('\n').filter(Boolean)
      .map(l => `<li>${l.replace(/^\s*\d+\. /,'')}</li>`);
    return '<ol>' + items.join('') + '</ol>';
  });

  // Инлайн
  s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  s = s.replace(/\*(.+?)\*/g, '<em>$1</em>');
  s = s.replace(/`([^`\n]+)`/g, '<code>$1</code>');
  s = s.replace(/\[([^\]]+)\]\((https?:\/\/[^\)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');

  // Абзацы
  const parts = s.split(/\n\n+/);
  return parts.map(p => {
    p = p.trim();
    if (!p || /^<(h\d|ul|ol|pre|blockquote|hr)/.test(p)) return p;
    return '<p>' + p.replace(/\n/g,'<br>') + '</p>';
  }).join('\n');
}

function copyCode(id) {
  const el = document.getElementById(id);
  if (!el) return;
  navigator.clipboard.writeText(el.innerText).then(() => {
    const btn = el.closest('pre').querySelector('.copy-btn');
    if (btn) { btn.textContent = '✓ Скопировано'; setTimeout(()=>btn.textContent='Копировать',2000); }
  });
}

// ── Сессии ────────────────────────────────────────────────────────────
async function loadSessions() {
  try {
    const r = await fetch('/api/sessions');
    const list = await r.json();
    renderSessionList(list);
  } catch { }
}

function renderSessionList(list) {
  const el = $('sess-list');
  if (!list || list.length === 0) {
    el.innerHTML = '<div class="aside-empty">Нет сохранённых чатов</div>';
    return;
  }
  el.innerHTML = list.map(s => {
    const d = new Date(s.updated_at);
    const dateStr = d.toLocaleDateString('ru',{day:'numeric',month:'short'});
    const active = s.id === activeSid ? ' active' : '';
    return `<div class="sess-item${active}" onclick="openSession('${s.id}')" id="si_${s.id}">
      <div style="flex:1;overflow:hidden">
        <div class="sess-title">${esc(s.title||'Новый чат')}</div>
        <div class="sess-date">${dateStr} · ${s.msg_count||0} сообщ.</div>
      </div>
      <button class="sess-del" onclick="delSession(event,'${s.id}')" title="Удалить">✕</button>
    </div>`;
  }).join('');
}

function markActive(sid) {
  document.querySelectorAll('.sess-item').forEach(el => {
    el.classList.toggle('active', el.id === 'si_' + sid);
  });
}

async function openSession(sid) {
  activeSid = sid;
  markActive(sid);
  closeSidebar();
  try {
    const r = await fetch('/api/sessions/' + sid);
    if (!r.ok) { newSession(); return; }
    const sess = await r.json();
    renderMessages(sess.messages || []);
    // Синхронизируем модель в шапке
    const sel = $('model-sel');
    if (sess.settings && sess.settings.model) {
      for (let o of sel.options) if (o.value === sess.settings.model) { sel.value = o.value; break; }
    }
    setStatus(`Чат загружен · ${sess.title}`);
  } catch (e) {
    setStatus('Ошибка загрузки сессии');
  }
}

function renderMessages(msgs) {
  const box = $('messages');
  box.innerHTML = '';
  for (const m of msgs) {
    if (m.role === 'system') continue;
    addBubble(m.role === 'user' ? 'user' : 'ai', renderMD(m.content));
  }
  if (box.children.length === 0) {
    addBubble('ai', '<p>Привет! Чем могу помочь?</p>');
  }
}

async function delSession(e, sid) {
  e.stopPropagation();
  await fetch('/api/sessions/' + sid, {method:'DELETE'});
  if (sid === activeSid) newSession();
  await loadSessions();
}

function newSession() {
  activeSid = 'sess_' + Math.random().toString(36).slice(2,10);
  $('messages').innerHTML = '<div class="msg ai"><div class="av">🤖</div>' +
    '<div class="bubble"><p>Новый чат начат. Чем могу помочь?</p></div></div>';
  markActive('');
  closeSidebar();
  setStatus('Новый чат');
}

// ── Чат ───────────────────────────────────────────────────────────────
function addBubble(role, html) {
  const wrap = document.createElement('div');
  wrap.className = 'msg ' + role;
  wrap.innerHTML = `<div class="av">${role==='user'?'👤':'🤖'}</div><div class="bubble">${html}</div>`;
  $('messages').appendChild(wrap);
  $('messages').scrollTop = $('messages').scrollHeight;
  return wrap.querySelector('.bubble');
}

function addTyping() {
  return addBubble('ai', '<div class="typing"><i></i><i></i><i></i></div>');
}

async function send() {
  if (busy) return;
  const inp = $('input');
  const text = inp.value.trim();
  if (!text) return;

  const model = $('model-sel').value || 'qwen2.5:0.5b';
  const temp  = parseFloat($('sp-temp').value) || 0.7;

  inp.value = ''; inp.style.height = 'auto';
  busy = true; $('send').disabled = true;

  addBubble('user', renderMD(text));
  const aiBub = addTyping();
  let raw = '', started = false;
  genStart = Date.now(); genTokens = 0;

  try {
    const resp = await fetch('/api/chat', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({message:text, model, session_id:activeSid, temperature:temp})
    });

    const reader = resp.body.getReader();
    const dec    = new TextDecoder();
    let buf = '';

    while (true) {
      const {value, done} = await reader.read();
      if (done) break;
      buf += dec.decode(value, {stream:true});
      const lines = buf.split('\n'); buf = lines.pop();

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        let d; try { d = JSON.parse(line.slice(6)); } catch { continue; }

        if (d.error) { aiBub.innerHTML = `<span style="color:var(--red)">⚠ ${esc(d.error)}</span>`; break; }
        if (d.done)  break;
        if (d.token !== undefined) {
          if (!started) { aiBub.innerHTML = ''; started = true; }
          raw += d.token; genTokens++;
          aiBub.innerHTML = renderMD(raw) + '<span class="cursor"></span>';
          $('messages').scrollTop = $('messages').scrollHeight;
          // Обновляем скорость каждые 20 токенов
          if (genTokens % 20 === 0) {
            const tps = (genTokens / ((Date.now()-genStart)/1000)).toFixed(1);
            $('st-speed').textContent = tps + ' tok/s';
          }
        }
      }
    }
  } catch(e) {
    aiBub.innerHTML = `<span style="color:var(--red)">⚠ ${esc(e.message)}</span>`;
  }

  if (started) aiBub.innerHTML = renderMD(raw); // финальный рендер без курсора
  const elapsed = ((Date.now()-genStart)/1000).toFixed(1);
  const tps = genTokens > 0 ? (genTokens/parseFloat(elapsed)).toFixed(1) : '–';
  setStatus(`${genTokens} токенов · ${elapsed}s`, tps + ' tok/s');

  busy = false; $('send').disabled = false;
  inp.focus();

  // Обновляем список сессий (появится название по первому сообщению)
  setTimeout(loadSessions, 500);
}

// ── Модели ────────────────────────────────────────────────────────────
async function loadModels() {
  try {
    const r = await fetch('/api/models');
    const models = await r.json();
    const sel = $('model-sel');
    const prev = sel.value;
    sel.innerHTML = '';
    if (!models || models.length === 0) {
      sel.innerHTML = '<option value="qwen2.5:0.5b">qwen2.5:0.5b</option>';
      setStatus('⚠ Нет моделей — запусти: localai pull qwen2.5:0.5b');
      return;
    }
    models.forEach(m => {
      const mb = Math.round(m.size/1024/1024);
      const o  = document.createElement('option');
      o.value  = m.name;
      o.text   = m.name + (mb ? ' ('+mb+' MB)' : '');
      sel.appendChild(o);
    });
    if (prev) sel.value = prev; // восстановить выбор
    setStatus('✓ Ollama · ' + models.length + ' модел' + plural(models.length,'ь','и','ей'));
  } catch {
    setStatus('✗ Ollama недоступен');
  }
}

function plural(n,a,b,c){const m=n%10,h=n%100;return(m===1&&h!==11)?a:(m>=2&&m<=4&&(h<10||h>=20))?b:c;}

function onModelChange() {
  // Обновляем модель текущей сессии
  const model = $('model-sel').value;
  if (!model || !activeSid) return;
  fetch('/api/sessions/'+activeSid, {
    method:'PATCH', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({model})
  }).catch(()=>{});
}

// ── Настройки ──────────────────────────────────────────────────────────
const PRESETS = {
  assistant: 'Ты полезный и дружелюбный AI-ассистент. Отвечай чётко, по делу, по-русски если пишут по-русски.',
  coder:     'Ты опытный разработчик. Помогай с кодом, давай конкретные примеры, объясняй решения.',
  translator:'Ты профессиональный переводчик. Переводи точно, сохраняя стиль и тон оригинала.',
  analyst:   'Ты аналитик данных. Структурируй информацию, выявляй закономерности, давай обоснованные выводы.',
};

function applyPreset(name) {
  $('sp-prompt').value = PRESETS[name] || '';
}

async function openSettings() {
  // Загружаем настройки текущей сессии
  try {
    const r = await fetch('/api/sessions/' + activeSid);
    if (r.ok) {
      const sess = await r.json();
      if (sess.settings) {
        $('sp-prompt').value = sess.settings.system_prompt || PRESETS.assistant;
        $('sp-temp').value   = sess.settings.temperature  || 0.7;
        $('sp-temp-val').textContent = sess.settings.temperature || 0.7;
      }
      $('sp-title').value = sess.title !== 'Новый чат' ? sess.title : '';
    }
  } catch {}
  $('settings-panel').classList.add('open');
  $('overlay').classList.add('on');
}

function closeSettings() {
  $('settings-panel').classList.remove('open');
  $('overlay').classList.remove('on');
}

async function saveSettings() {
  const patch = {
    system_prompt: $('sp-prompt').value.trim(),
    temperature:   parseFloat($('sp-temp').value),
    model:         $('model-sel').value,
  };
  const title = $('sp-title').value.trim();
  if (title) patch.title = title;

  try {
    await fetch('/api/sessions/'+activeSid, {
      method:'PATCH', headers:{'Content-Type':'application/json'},
      body: JSON.stringify(patch)
    });
    closeSettings();
    setStatus('Настройки сохранены');
    await loadSessions();
  } catch (e) {
    setStatus('Ошибка сохранения: ' + e.message);
  }
}

// ── Sidebar (mobile) ──────────────────────────────────────────────────
function toggleSidebar() { $('sidebar').classList.toggle('open'); }
function closeSidebar()   { $('sidebar').classList.remove('open'); }

// ── Ввод ──────────────────────────────────────────────────────────────
$('input').addEventListener('keydown', e => {
  if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});
$('input').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 130) + 'px';
});

// ── Инициализация ─────────────────────────────────────────────────────
(async () => {
  await loadModels();
  await loadSessions();
  setInterval(loadModels, 30000);
  setInterval(loadSessions, 10000);
  $('input').focus();
})();
</script>
